<!DOCTYPE html>
<html>
<head>
    <title>BMI Calculator</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
            text-align:center;
            margin-top:50px;
        }

        .container{
            width:350px;
            background:white;
            margin:auto;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px 0;
        }

        button{
            padding:10px 20px;
            cursor:pointer;
        }

        #result{
            margin-top:20px;
            font-size:18px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container">

<h2>BMI Calculator</h2>

<input type="number"
       id="weight"
       placeholder="Weight (kg)">

<input type="number"
       id="height"
       placeholder="Height (m)">

<button onclick="calculateBMI()">
Calculate BMI
</button>

<div id="result"></div>

</div>

<script>

function calculateBMI(){

    let weight =
    parseFloat(document.getElementById("weight").value);

    let height =
    parseFloat(document.getElementById("height").value);

    if(weight<=0 || height<=0){
        alert("Enter valid values");
        return;
    }

    let bmi =
    weight / (height * height);

    let status;

    if(bmi < 18.5)
        status = "Underweight";

    else if(bmi < 25)
        status = "Normal Weight";

    else if(bmi < 30)
        status = "Overweight";

    else
        status = "Obese";

    document.getElementById("result").innerHTML =
    "BMI = " + bmi.toFixed(2) +
    "<br>" + status;
}

</script>

</body>
</html>
